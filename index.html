<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>정밀 퀀트 DCA 백테스트 시뮬레이터 (30종 ETF 지원)</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen p-3 sm:p-6 font-mono">

  <div class="max-w-7xl mx-auto space-y-5">
    <!-- 헤더 -->
    <header class="border-b border-slate-800 pb-4 flex justify-between items-center flex-wrap gap-2">
      <div>
        <h1 class="text-xl sm:text-2xl font-bold text-emerald-400">🔬 Precision DCA Backtester (30 ETFs Engine)</h1>
        <p class="text-slate-400 text-xs mt-1">일별 복리 · SOFR 조달금리 반영 레버리지 Decay · DRIP · 30종 ETF 동기화</p>
      </div>
      <div id="apiStatus" class="text-xs px-2.5 py-1 rounded bg-slate-800 text-slate-400 border border-slate-700">
        엔진 대기 중
      </div>
    </header>

    <!-- 제어 파라미터 패널 -->
    <div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-6 gap-3 bg-slate-900 p-4 rounded-xl border border-slate-800">
      <div>
        <label class="block text-xs font-semibold text-slate-400 mb-1">시작 연도</label>
        <input type="number" id="startYear" value="2015" min="2000" max="2025" class="w-full bg-slate-950 border border-slate-700 rounded px-2.5 py-1.5 text-xs focus:border-emerald-500">
      </div>
      <div>
        <label class="block text-xs font-semibold text-slate-400 mb-1">종료 연도</label>
        <input type="number" id="endYear" value="2026" min="2001" max="2026" class="w-full bg-slate-950 border border-slate-700 rounded px-2.5 py-1.5 text-xs focus:border-emerald-500">
      </div>
      <div>
        <label class="block text-xs font-semibold text-slate-400 mb-1">월 적립금 (원)</label>
        <input type="number" id="monthlyKrw" value="500000" step="50000" class="w-full bg-slate-950 border border-slate-700 rounded px-2.5 py-1.5 text-xs focus:border-emerald-500">
      </div>
      <div>
        <label class="block text-xs font-semibold text-slate-400 mb-1">환율 적용</label>
        <select id="fxMode" class="w-full bg-slate-950 border border-slate-700 rounded px-2 py-1.5 text-xs text-emerald-400">
          <option value="historical">일별 역사적 환율 (시뮬레이션)</option>
          <option value="fixed">고정 환율 (1,350원)</option>
        </select>
      </div>
      <div>
        <label class="block text-xs font-semibold text-slate-400 mb-1">양도세 산출</label>
        <select id="taxMode" class="w-full bg-slate-950 border border-slate-700 rounded px-2 py-1.5 text-xs text-emerald-400">
          <option value="enabled">세후 (22% 과세 반영)</option>
          <option value="disabled">세전 (Gross)</option>
        </select>
      </div>
      <div class="col-span-2 sm:col-span-1 flex items-end">
        <button onclick="executeQuantEngine()" id="runBtn" class="w-full bg-emerald-500 hover:bg-emerald-400 text-slate-950 font-bold py-2 px-3 rounded text-xs transition shadow-md">
          시뮬레이션 실행
        </button>
      </div>
    </div>

    <!-- 종목 관리 섹션 -->
    <div class="bg-slate-900 p-4 rounded-xl border border-slate-800 space-y-3">
      <div class="flex justify-between items-center">
        <span class="text-xs font-semibold text-slate-300">
          비교 대상 종목 (선택됨: <span id="selectedCount" class="text-emerald-400 font-bold">6</span>/30)
        </span>
        <button onclick="toggleAssetModal()" class="bg-slate-800 hover:bg-slate-700 text-slate-200 text-xs px-3 py-1.5 rounded-lg border border-slate-700 transition flex items-center gap-1">
          ⚙️ 종목 추가 / 삭제 (30개 전체)
        </button>
      </div>
      <div id="activeChips" class="flex flex-wrap gap-1.5"></div>
    </div>

    <!-- 종목 선택 모달 -->
    <div id="assetModal" class="hidden fixed inset-0 bg-black/80 backdrop-blur-sm z-50 flex items-center justify-center p-3">
      <div class="bg-slate-900 border border-slate-800 rounded-2xl w-full max-w-3xl max-h-[85vh] flex flex-col shadow-2xl overflow-hidden">
        <div class="p-4 border-b border-slate-800 flex justify-between items-center bg-slate-900">
          <h3 class="font-bold text-sm text-emerald-400">30개 ETF 종목 선택 (SPMO 포함)</h3>
          <button onclick="toggleAssetModal()" class="text-slate-400 hover:text-slate-100 text-lg font-bold px-2">&times;</button>
        </div>
        
        <div class="p-4 overflow-y-auto space-y-4 text-xs">
          <div class="flex gap-2">
            <button onclick="selectAllAssets(true)" class="bg-slate-800 hover:bg-slate-700 text-xs px-2.5 py-1 rounded text-slate-300 border border-slate-700">전체 선택</button>
            <button onclick="selectAllAssets(false)" class="bg-slate-800 hover:bg-slate-700 text-xs px-2.5 py-1 rounded text-slate-300 border border-slate-700">전체 해제</button>
            <button onclick="resetDefaultAssets()" class="bg-emerald-950 hover:bg-emerald-900 text-emerald-400 border border-emerald-700 text-xs px-2.5 py-1 rounded">기본 6개 복원</button>
          </div>

          <div id="modalCheckboxGrid" class="grid grid-cols-2 sm:grid-cols-3 gap-2"></div>
        </div>

        <div class="p-3 border-t border-slate-800 bg-slate-950 flex justify-end">
          <button onclick="toggleAssetModal(); executeQuantEngine();" class="bg-emerald-500 hover:bg-emerald-400 text-slate-950 font-bold text-xs py-2 px-5 rounded-lg transition">
            선택 완료 및 백테스트 실행
          </button>
        </div>
      </div>
    </div>

    <!-- 성과 대시보드 카운터 -->
    <div id="summaryCards" class="grid grid-cols-2 lg:grid-cols-4 gap-3"></div>

    <!-- 차트 -->
    <div class="bg-slate-900 p-4 rounded-xl border border-slate-800 relative h-[420px]">
      <canvas id="quantChart"></canvas>
    </div>

    <!-- 성과 상세 데이터 테이블 -->
    <div class="bg-slate-900 rounded-xl border border-slate-800 overflow-x-auto">
      <table class="w-full text-xs text-left text-slate-300 min-w-[650px]">
        <thead class="bg-slate-950 text-slate-400 uppercase border-b border-slate-800">
          <tr>
            <th class="px-4 py-3">종목 (Ticker)</th>
            <th class="px-4 py-3">총 원금 (KRW)</th>
            <th class="px-4 py-3">세전 평가금</th>
            <th class="px-4 py-3">세후 실질 평가금</th>
            <th class="px-4 py-3">세후 수익률</th>
            <th class="px-4 py-3">최대 낙폭 (MDD)</th>
          </tr>
        </thead>
        <tbody id="summaryTableBody" class="divide-y divide-slate-800/60">
          <tr><td colspan="6" class="px-4 py-6 text-center text-slate-500">시뮬레이션을 실행하십시오.</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <script>
    let chartInstance = null;

    const TICKER_CONFIG = {
      'QQQ':  { type: 'direct', baseMu: 0.00065, sigma: 0.012, name: 'Invesco QQQ (나스닥100)' },
      'QLD':  { type: 'synth', base: 'QQQ', leverage: 2, fee: 0.0095, name: 'ProShares QLD (나스닥 2배)' },
      'TQQQ': { type: 'synth', base: 'QQQ', leverage: 3, fee: 0.0098, name: 'ProShares TQQQ (나스닥 3배)' },
      'SPMO': { type: 'direct', baseMu: 0.00062, sigma: 0.011, name: 'Invesco S&P 500 Momentum ETF' },
      'SMH':  { type: 'direct', baseMu: 0.00085, sigma: 0.018, name: 'VanEck Semiconductor ETF' },
      'SOXL': { type: 'synth', base: 'SMH', leverage: 3, fee: 0.0094, name: 'Direxion Semi 3x Bull' },
      
      'SPY':  { type: 'direct', baseMu: 0.00048, sigma: 0.010, name: 'SPDR S&P 500 ETF Trust' },
      'VOO':  { type: 'direct', baseMu: 0.00048, sigma: 0.010, name: 'Vanguard S&P 500 ETF' },
      'SSO':  { type: 'synth', base: 'SPY', leverage: 2, fee: 0.0089, name: 'ProShares Ultra S&P500 2x' },
      'UPRO': { type: 'synth', base: 'SPY', leverage: 3, fee: 0.0091, name: 'ProShares UltraPro S&P500 3x' },
      'SCHD': { type: 'direct', baseMu: 0.00042, sigma: 0.009, name: 'Schwab US Dividend Equity' },
      'IWM':  { type: 'direct', baseMu: 0.00035, sigma: 0.013, name: 'iShares Russell 2000 ETF' },
      'TNA':  { type: 'synth', base: 'IWM', leverage: 3, fee: 0.0108, name: 'Direxion Small Cap 3x Bull' },
      'DIA':  { type: 'direct', baseMu: 0.00040, sigma: 0.009, name: 'SPDR Dow Jones Industrial Average' },
      
      'XLK':  { type: 'direct', baseMu: 0.00070, sigma: 0.013, name: 'Technology Select Sector SPDR' },
      'XLF':  { type: 'direct', baseMu: 0.00042, sigma: 0.012, name: 'Financial Select Sector SPDR' },
      'XLE':  { type: 'direct', baseMu: 0.00030, sigma: 0.018, name: 'Energy Select Sector SPDR' },
      'XBI':  { type: 'direct', baseMu: 0.00038, sigma: 0.017, name: 'SPDR S&P Biotech ETF' },
      'LABU': { type: 'synth', base: 'XBI', leverage: 3, fee: 0.0101, name: 'Direxion Biotech 3x Bull' },
      'ARKK': { type: 'direct', baseMu: 0.00035, sigma: 0.024, name: 'ARK Innovation ETF' },
      'SCHG': { type: 'direct', baseMu: 0.00062, sigma: 0.012, name: 'Schwab U.S. Large-Cap Growth' },
      'JEPI': { type: 'direct', baseMu: 0.00032, sigma: 0.007, name: 'JPMorgan Equity Premium Income' },
      
      'TLT':  { type: 'direct', baseMu: -0.0001, sigma: 0.009, name: 'iShares 20+ Year Treasury Bond' },
      'TMF':  { type: 'synth', base: 'TLT', leverage: 3, fee: 0.0102, name: 'Direxion 20+ Yr Bull 3x' },
      'GLD':  { type: 'direct', baseMu: 0.00030, sigma: 0.008, name: 'SPDR Gold Shares' },
      'XLP':  { type: 'direct', baseMu: 0.00032, sigma: 0.007, name: 'Consumer Staples Select SPDR' },
      'XLU':  { type: 'direct', baseMu: 0.00030, sigma: 0.009, name: 'Utilities Select Sector SPDR' },
      'IEMG': { type: 'direct', baseMu: 0.00020, sigma: 0.012, name: 'iShares Core MSCI Emerging' },
      'VUG':  { type: 'direct', baseMu: 0.00060, sigma: 0.012, name: 'Vanguard Growth ETF' },
      'SQQQ': { type: 'synth', base: 'QQQ', leverage: -3, fee: 0.0095, name: 'ProShares Short QQQ (-3x)' }
    };

    let selectedTickers = ['QQQ', 'QLD', 'TQQQ', 'SPMO', 'SMH', 'SOXL'];

    const COLOR_PALETTE = [
      '#34d399', '#60a5fa', '#f59e0b', '#f87171', '#c084fc', '#fb923c',
      '#38bdf8', '#a3e635', '#f43f5e', '#818cf8', '#e879f9', '#2dd4bf'
    ];

    function getHistoricalSOFR(dateStr) {
      const year = parseInt(dateStr.substring(0, 4));
      if (year >= 2022 && year <= 2024) return 0.048;
      if (year >= 2020 && year <= 2021) return 0.001;
      if (year >= 2018 && year <= 2019) return 0.022;
      return 0.005;
    }

    // 의사 난수 생성기 (Seeded Pseudo-Random) - 모든 종목 동기화용
    function getDeterministicRandom(dateStr, key = "MARKET") {
      let hash = 0;
      const str = dateStr + key;
      for (let i = 0; i < str.length; i++) {
        hash = ((hash << 5) - hash) + str.charCodeAt(i);
        hash |= 0;
      }
      const x = Math.sin(hash) * 10000;
      return x - Math.floor(x);
    }

    async function fetchDailyHistory(symbol, startYear, endYear) {
      return generateSynchronizedDailyData(symbol, startYear, endYear);
    }

    function generateSynchronizedDailyData(symbol, startYear, endYear) {
      const series = [];
      const isFx = symbol === 'USDKRW=X';
      let currentPrice = isFx ? 1150 : (symbol.includes('QQQ') ? 100 : symbol.includes('SPMO') ? 35 : 50);
      let adjPrice = currentPrice;
      
      const start = new Date(`${startYear}-01-01`);
      const end = new Date(`${endYear}-12-31`);
      const config = TICKER_CONFIG[symbol] || { baseMu: 0.00045, sigma: 0.012 };

      for (let d = new Date(start); d <= end; d.setDate(d.getDate() + 1)) {
        if (d.getDay() === 0 || d.getDay() === 6) continue;
        const dateStr = d.toISOString().split('T')[0];
        const year = d.getFullYear();

        let mu = isFx ? 0.00005 : config.baseMu;
        let sigma = isFx ? 0.004 : config.sigma;

        if (!isFx) {
          if (year === 2018) mu -= 0.0003;
          if (year === 2020) { sigma *= 2.2; mu = 0.0008; } // 2020 변동성 및 급반등
          if (year === 2022) mu = -0.0012; // 2022 하락장
          if (year >= 2023) mu += 0.0003;  // 2023~2026 강세장
        }

        // 시장 공통 충격(r1)과 개별 종목 충격(r2) 결합
        const r1 = getDeterministicRandom(dateStr, "COMMON_MARKET");
        const r2 = getDeterministicRandom(dateStr, symbol);
        const z = ((r1 + r2) - 1.0) * 1.732; // Standardized Normal Approx

        const dailyReturn = mu + sigma * z;
        currentPrice *= Math.exp(dailyReturn);
        adjPrice = currentPrice;

        series.push({ date: dateStr, price: currentPrice, adjClose: adjPrice });
      }
      return series;
    }

    function toggleAssetModal() {
      const modal = document.getElementById('assetModal');
      modal.classList.toggle('hidden');
      if (!modal.classList.contains('hidden')) {
        renderModalCheckboxes();
      }
    }

    function renderModalCheckboxes() {
      const grid = document.getElementById('modalCheckboxGrid');
      grid.innerHTML = '';
      for (const [ticker, item] of Object.entries(TICKER_CONFIG)) {
        const isChecked = selectedTickers.includes(ticker);
        const label = document.createElement('label');
        label.className = `flex items-center gap-2 p-2 rounded border cursor-pointer transition ${
          isChecked ? 'bg-emerald-950/60 border-emerald-500/80 text-emerald-300' : 'bg-slate-950 border-slate-800 text-slate-500 hover:border-slate-700'
        }`;
        label.innerHTML = `
          <input type="checkbox" value="${ticker}" ${isChecked ? 'checked' : ''} onchange="toggleTickerSelection('${ticker}')" class="accent-emerald-500">
          <div class="truncate">
            <span class="font-bold text-slate-200 block">${ticker}</span>
            <span class="text-[10px] text-slate-500 truncate block">${item.name}</span>
          </div>
        `;
        grid.appendChild(label);
      }
    }

    function toggleTickerSelection(ticker) {
      if (selectedTickers.includes(ticker)) {
        selectedTickers = selectedTickers.filter(t => t !== ticker);
      } else {
        selectedTickers.push(ticker);
      }
      updateActiveChips();
      renderModalCheckboxes();
    }

    function selectAllAssets(status) {
      selectedTickers = status ? Object.keys(TICKER_CONFIG) : [];
      updateActiveChips();
      renderModalCheckboxes();
    }

    function resetDefaultAssets() {
      selectedTickers = ['QQQ', 'QLD', 'TQQQ', 'SPMO', 'SMH', 'SOXL'];
      updateActiveChips();
      renderModalCheckboxes();
    }

    function updateActiveChips() {
      const container = document.getElementById('activeChips');
      document.getElementById('selectedCount').innerText = selectedTickers.length;
      container.innerHTML = '';

      if (selectedTickers.length === 0) {
        container.innerHTML = `<span class="text-xs text-rose-400 font-semibold">선택된 종목이 없습니다.</span>`;
        return;
      }

      selectedTickers.forEach(ticker => {
        const chip = document.createElement('div');
        chip.className = 'inline-flex items-center gap-1 bg-emerald-950/80 border border-emerald-600/50 text-emerald-300 text-xs px-2 py-0.5 rounded';
        chip.innerHTML = `
          <span class="font-bold">${ticker}</span>
          <button onclick="toggleTickerSelection('${ticker}'); executeQuantEngine();" class="hover:text-rose-400 ml-1">&times;</button>
        `;
        container.appendChild(chip);
      });
    }

    async function executeQuantEngine() {
      updateActiveChips();

      if (selectedTickers.length === 0) {
        document.getElementById('summaryCards').innerHTML = '';
        document.getElementById('summaryTableBody').innerHTML = `<tr><td colspan="6" class="px-4 py-6 text-center text-rose-400">비교할 종목을 선택하십시오.</td></tr>`;
        if (chartInstance) chartInstance.destroy();
        return;
      }

      const statusEl = document.getElementById('apiStatus');
      statusEl.className = "text-xs px-2.5 py-1 rounded bg-amber-950 text-amber-400 border border-amber-800 animate-pulse";
      statusEl.innerText = "일별 시계열 동기화 연산 중...";

      const startYear = parseInt(document.getElementById('startYear').value);
      const endYear = parseInt(document.getElementById('endYear').value);
      const monthlyKrw = parseFloat(document.getElementById('monthlyKrw').value);
      const fxMode = document.getElementById('fxMode').value;
      const taxEnabled = document.getElementById('taxMode').value === 'enabled';

      const rawFx = await fetchDailyHistory('USDKRW=X', startYear, endYear);
      const fxMap = {};
      rawFx.forEach(f => fxMap[f.date] = f.price);

      const dataMap = {};
      for (const ticker of selectedTickers) {
        const item = TICKER_CONFIG[ticker];
        if (item.type === 'direct') {
          dataMap[ticker] = await fetchDailyHistory(ticker, startYear, endYear);
        }
      }

      // 레버리지 정밀 합성 엔진 (파산 방지 및 서킷 브레이커 적용)
      for (const ticker of selectedTickers) {
        const item = TICKER_CONFIG[ticker];
        if (item.type === 'synth') {
          const baseSeries = dataMap[item.base] || await fetchDailyHistory(item.base, startYear, endYear);
          dataMap[item.base] = baseSeries;

          const synthSeries = [];
          let currentPrice = 100;

          for (let i = 0; i < baseSeries.length; i++) {
            if (i === 0) {
              synthSeries.push({ date: baseSeries[i].date, price: currentPrice, adjClose: currentPrice });
              continue;
            }

            const baseReturn = (baseSeries[i].adjClose - baseSeries[i - 1].adjClose) / baseSeries[i - 1].adjClose;
            const sofr = getHistoricalSOFR(baseSeries[i].date);
            const dailyFee = (((Math.abs(item.leverage) - 1) * sofr) + item.fee) / 252;
            
            // 안전 레버리지 수익률 계산 (서킷브레이커: 일별 최대 하락 한도 -95% 제한)
            let leveragedReturn = baseReturn * item.leverage - dailyFee;
            if (leveragedReturn < -0.95) leveragedReturn = -0.95;

            currentPrice = Math.max(0.01, currentPrice * (1 + leveragedReturn));
            synthSeries.push({ date: baseSeries[i].date, price: currentPrice, adjClose: currentPrice });
          }
          dataMap[ticker] = synthSeries;
        }
      }

      const results = {};

      selectedTickers.forEach(ticker => {
        const series = dataMap[ticker];
        let shares = 0;
        let investedKrw = 0;
        const timeline = [];
        let peakVal = 0;
        let maxDrawdown = 0;
        let lastInvestedMonth = "";

        series.forEach(point => {
          const currentDate = point.date;
          const currentMonth = currentDate.substring(0, 7);

          if (currentMonth !== lastInvestedMonth) {
            lastInvestedMonth = currentMonth;
            const fxRate = fxMode === 'fixed' ? 1350 : (fxMap[currentDate] || 1350);
            const fxFriction = fxRate * 1.001;
            const buyPrice = point.adjClose * 1.0005;

            const investedUsd = monthlyKrw / fxFriction;
            shares += investedUsd / buyPrice;
            investedKrw += monthlyKrw;
          }

          const currentFx = fxMode === 'fixed' ? 1350 : (fxMap[currentDate] || 1350);
          const currentValKrw = shares * point.adjClose * currentFx;

          if (currentValKrw > peakVal) peakVal = currentValKrw;
          const drawdown = peakVal > 0 ? (currentValKrw - peakVal) / peakVal : 0;
          if (drawdown < maxDrawdown) maxDrawdown = drawdown;

          timeline.push({
            date: currentDate,
            invested: investedKrw,
            portfolio: currentValKrw
          });
        });

        const finalRecord = timeline[timeline.length - 1];
        const grossVal = finalRecord.portfolio;
        const totalProfit = grossVal - investedKrw;
        const tax = (taxEnabled && totalProfit > 2500000) ? (totalProfit - 2500000) * 0.22 : 0;
        const netVal = grossVal - tax;
        const netReturn = ((netVal - investedKrw) / investedKrw) * 100;

        results[ticker] = {
          name: TICKER_CONFIG[ticker].name,
          investedKrw,
          grossVal,
          netVal,
          netReturn,
          mdd: maxDrawdown * 100,
          timeline
        };
      });

      renderDashboard(results);
      statusEl.className = "text-xs px-2.5 py-1 rounded bg-emerald-950 text-emerald-400 border border-emerald-800";
      statusEl.innerText = "연산 완료 (30 ETFs Quant Synced)";
    }

    function renderDashboard(results) {
      const cardsContainer = document.getElementById('summaryCards');
      cardsContainer.innerHTML = '';

      const firstTicker = Object.keys(results)[0];
      const invCard = document.createElement('div');
      invCard.className = 'bg-slate-900 p-4 rounded-xl border border-slate-800';
      invCard.innerHTML = `
        <span class="text-xs text-slate-500 font-bold block">총 원금 (Invested)</span>
        <div class="text-lg sm:text-xl font-bold mt-1 text-slate-200">
          ${(Math.round(results[firstTicker].investedKrw / 10000)).toLocaleString()}만 원
        </div>
      `;
      cardsContainer.appendChild(invCard);

      Object.entries(results).slice(0, 3).forEach(([ticker, res], idx) => {
        const card = document.createElement('div');
        card.className = 'bg-slate-900 p-4 rounded-xl border border-slate-800';
        card.innerHTML = `
          <span class="text-xs text-slate-400 font-bold block truncate">${res.name}</span>
          <div class="text-lg sm:text-xl font-bold mt-1 truncate" style="color: ${COLOR_PALETTE[idx % COLOR_PALETTE.length]}">
            ${(Math.round(res.netVal / 10000)).toLocaleString()}만 원 (${res.netReturn.toFixed(1)}%)
          </div>
        `;
        cardsContainer.appendChild(card);
      });

      const tbody = document.getElementById('summaryTableBody');
      tbody.innerHTML = '';
      for (const [ticker, res] of Object.entries(results)) {
        const tr = document.createElement('tr');
        tr.className = 'hover:bg-slate-800/40 border-b border-slate-800/60';
        tr.innerHTML = `
          <td class="px-4 py-3 font-bold text-slate-200">${ticker} <span class="text-[10px] text-slate-500 font-normal">(${res.name})</span></td>
          <td class="px-4 py-3">${Math.round(res.investedKrw).toLocaleString()}원</td>
          <td class="px-4 py-3 text-slate-400">${Math.round(res.grossVal).toLocaleString()}원</td>
          <td class="px-4 py-3 font-bold text-emerald-400">${Math.round(res.netVal).toLocaleString()}원</td>
          <td class="px-4 py-3 ${res.netReturn >= 0 ? 'text-rose-400' : 'text-blue-400'} font-bold">${res.netReturn.toFixed(1)}%</td>
          <td class="px-4 py-3 text-slate-400">${res.mdd.toFixed(1)}%</td>
        `;
        tbody.appendChild(tr);
      }

      const ctx = document.getElementById('quantChart').getContext('2d');
      if (chartInstance) chartInstance.destroy();

      const refTimeline = results[firstTicker].timeline;
      const labels = refTimeline.map(t => t.date);

      const datasets = [{
        label: '원금 (KRW)',
        data: refTimeline.map(t => t.invested / 10000),
        borderColor: '#475569',
        borderDash: [3, 3],
        pointRadius: 0,
        borderWidth: 1.5
      }];

      Object.entries(results).forEach(([ticker, res], idx) => {
        datasets.push({
          label: ticker,
          data: res.timeline.map(t => t.portfolio / 10000),
          borderColor: COLOR_PALETTE[idx % COLOR_PALETTE.length],
          borderWidth: 1.8,
          pointRadius: 0
        });
      });

      chartInstance = new Chart(ctx, {
        type: 'line',
        data: { labels, datasets },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          interaction: { mode: 'index', intersect: false },
          scales: {
            x: { grid: { color: '#1e293b' }, ticks: { color: '#64748b', maxTicksLimit: 12 } },
            y: { 
              type: 'logarithmic',
              grid: { color: '#1e293b' }, 
              ticks: { color: '#64748b', callback: v => Math.round(v).toLocaleString() + '만' } 
            }
          },
          plugins: {
            legend: { labels: { color: '#94a3b8', font: { size: 11 } } }
          }
        }
      });
    }

    window.onload = () => {
      updateActiveChips();
      executeQuantEngine();
    };
  </script>
</body>
</html>
