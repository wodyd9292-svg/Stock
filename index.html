    /**
     * 32비트 Mulberry32 난수 생성기 및 Gaussian Box-Muller 변환 모듈
     */
    class PseudoRandomEngine {
      constructor(seed = 1337) {
        this.state = seed >>> 0;
      }
      next() {
        this.state = (this.state + 0x6D2B79F5) >>> 0;
        let z = this.state;
        z = Math.imul(z ^ (z >>> 15), z | 1);
        z ^= z + Math.imul(z ^ (z >>> 7), z | 61);
        return ((z ^ (z >>> 14)) >>> 0) / 4294967296;
      }
      getGaussian() {
        let u1 = this.next();
        let u2 = this.next();
        while (u1 === 0) u1 = this.next();
        return Math.sqrt(-2.0 * Math.log(u1)) * Math.cos(2.0 * Math.PI * u2);
      }
    }

    class MarketCalendarBuilder {
      static generate(startYear, endYear) {
        const dates = [], years = [], months = [], isNewMonth = [], isYearEnd = [];
        let lastMonth = "";
        const start = new Date(`${startYear}-01-01`);
        const end = new Date(`${endYear}-12-31`);

        for (let d = new Date(start); d <= end; d.setDate(d.getDate() + 1)) {
          const day = d.getDay();
          if (day === 0 || day === 6) continue;
          const dateStr = d.toISOString().split('T')[0];
          const monthStr = dateStr.substring(0, 7);
          
          dates.push(dateStr);
          years.push(d.getFullYear());
          months.push(monthStr);

          if (monthStr !== lastMonth) {
            isNewMonth.push(true);
            lastMonth = monthStr;
          } else {
            isNewMonth.push(false);
          }
        }

        for (let i = 0; i < dates.length; i++) {
          const isLast = (i === dates.length - 1) || (years[i] !== years[i + 1]);
          isYearEnd.push(isLast);
        }

        return { dates, years, months, isNewMonth, isYearEnd, count: dates.length };
      }
    }

    class QuantStochasticEngine {
      static getHistoricalSOFR(year) {
        if (year >= 2022 && year <= 2024) return 0.048;
        if (year >= 2020 && year <= 2021) return 0.001;
        if (year >= 2018 && year <= 2019) return 0.022;
        return 0.005;
      }

      static simulate(calendar, tickers, fxMode) {
        const N = calendar.count;
        const prng = new PseudoRandomEngine(424242);
        
        // 시장 공통 요인 (Market Shock Factor)
        const marketShocks = new Float64Array(N);
        for (let i = 0; i < N; i++) marketShocks[i] = prng.getGaussian();

        // FX 확률 과정 생성
        const fxPrices = new Float64Array(N);
        let currentFx = 1150.0;
        for (let i = 0; i < N; i++) {
          if (fxMode === 'fixed') {
            fxPrices[i] = 1350.0;
          } else {
            const zFx = prng.getGaussian();
            const drift = 0.00003 - 0.5 * (0.0035 ** 2);
            currentFx *= Math.exp(drift + 0.0035 * zFx);
            fxPrices[i] = currentFx;
          }
        }

        const priceMap = {};

        // 1단계: Direct Asset 시뮬레이션 (Single-Factor Model 적용)
        tickers.forEach(ticker => {
          const config = TICKER_UNIVERSE[ticker];
          if (config.type === 'direct') {
            const prices = new Float64Array(N);
            let price = ticker.includes('QQQ') ? 100 : ticker.includes('SPMO') ? 35 : 50;
            const rho = config.marketCorr || 0.8;
            const sqrtOneMinusRho2 = Math.sqrt(1 - rho * rho);

            for (let i = 0; i < N; i++) {
              const year = calendar.years[i];
              let mu = config.baseMu;
              let sigma = config.sigma;

              if (year === 2018) mu -= 0.0003;
              if (year === 2020) { sigma *= 2.1; mu = 0.0008; }
              if (year === 2022) mu = -0.0012;
              if (year >= 2023) mu += 0.0003;

              const zIndiv = prng.getGaussian();
              const zCombined = rho * marketShocks[i] + sqrtOneMinusRho2 * zIndiv;
              const drift = mu - 0.5 * sigma * sigma;

              price *= Math.exp(drift + sigma * zCombined);
              prices[i] = price;
            }
            priceMap[ticker] = prices;
          }
        });

        // 2단계: Leveraged Synthetic Asset 시뮬레이션
        tickers.forEach(ticker => {
          const config = TICKER_UNIVERSE[ticker];
          if (config.type === 'synth') {
            const basePrices = priceMap[config.base];
            const prices = new Float64Array(N);
            let currentPrice = 100.0;
            prices[0] = currentPrice;

            for (let i = 1; i < N; i++) {
              const baseReturn = (basePrices[i] - basePrices[i - 1]) / basePrices[i - 1];
              const sofr = this.getHistoricalSOFR(calendar.years[i]);
              const dailyDrag = (((Math.abs(config.leverage) - 1) * sofr) + config.fee) / 252;

              let leveragedReturn = baseReturn * config.leverage - dailyDrag;
              if (leveragedReturn < -0.98) leveragedReturn = -0.98;

              currentPrice *= (1 + leveragedReturn);
              if (currentPrice < 1e-9) currentPrice = 1e-9;
              prices[i] = currentPrice;
            }
            priceMap[ticker] = prices;
          }
        });

        return { fxPrices, priceMap };
      }
    }

    class BacktestExecutionEngine {
      static run(calendar, tickers, engineData, monthlyKrw, taxEnabled) {
        const N = calendar.count;
        const { fxPrices, priceMap } = engineData;
        const results = {};
        const FRICTION_RATE = 0.0005; // 0.05% 수수료 및 슬리피지
        const TAX_EXEMPTION_LIMIT = 2500000.0;

        tickers.forEach(ticker => {
          const config = TICKER_UNIVERSE[ticker];
          const prices = priceMap[ticker];
          let shares = 0.0;
          let investedKrw = 0.0;
          let costBasisKrw = 0.0;
          let peakVal = 0.0;
          let maxDrawdown = 0.0;
          let totalTaxPaid = 0.0;

          const portfolioValues = new Float64Array(N);
          const investedSeries = new Float64Array(N);

          for (let i = 0; i < N; i++) {
            if (calendar.isNewMonth[i]) {
              const fxRate = fxPrices[i];
              const buyFx = fxRate * (1 + FRICTION_RATE);
              const buyPrice = prices[i] * (1 + FRICTION_RATE);

              const investedUsd = monthlyKrw / buyFx;
              shares += investedUsd / buyPrice;
              investedKrw += monthlyKrw;
              costBasisKrw += monthlyKrw;

              // 배당금 재투자 (DRIP) 연산
              if (shares > 0 && config.divYield > 0) {
                const monthlyDivYield = config.divYield / 12;
                const grossDivUsd = shares * prices[i] * monthlyDivYield;
                const netDivUsd = grossDivUsd * (1 - 0.154); // 미국 배당소득세율 15.4%
                shares += netDivUsd / buyPrice;
                costBasisKrw += netDivUsd * fxRate;
              }
            }

            let currentValKrw = shares * prices[i] * fxPrices[i];

            // 연말 이산 과세 및 Step-up Basis 적용
            if (taxEnabled && calendar.isYearEnd[i]) {
              const unrealizedGain = currentValKrw - costBasisKrw;
              if (unrealizedGain > 0) {
                const harvestedGain = Math.min(unrealizedGain, TAX_EXEMPTION_LIMIT);
                const frictionCost = harvestedGain * FRICTION_RATE;
                
                costBasisKrw += harvestedGain;
                currentValKrw -= frictionCost; // 리밸런싱 마찰비용 차감
              }
            }

            portfolioValues[i] = currentValKrw;
            investedSeries[i] = investedKrw;

            if (currentValKrw > peakVal) peakVal = currentValKrw;
            const drawdown = peakVal > 0 ? (currentValKrw - peakVal) / peakVal : 0;
            if (drawdown < maxDrawdown) maxDrawdown = drawdown;
          }

          const grossVal = portfolioValues[N - 1];
          const finalUnrealizedGain = Math.max(0, grossVal - costBasisKrw);
          const taxableProfit = Math.max(0, finalUnrealizedGain - TAX_EXEMPTION_LIMIT);
          const finalTax = (taxEnabled && taxableProfit > 0) ? taxableProfit * 0.22 : 0;
          totalTaxPaid += finalTax;

          const finalVal = grossVal - finalTax;
          const finalReturn = ((finalVal - investedKrw) / investedKrw) * 100;

          results[ticker] = {
            name: config.name,
            investedKrw,
            grossVal,
            taxAmount: totalTaxPaid,
            finalVal,
            finalReturn,
            mdd: maxDrawdown * 100,
            portfolioValues,
            investedSeries
          };
        });

        return results;
      }
    }

        this.runBacktest();

      static toggleModal() {
        const modal = document.getElementById('assetModal');
        modal.classList.toggle('hidden');
        if (!modal.classList.contains('hidden')) {
          this.renderModalCheckboxes();
        }
      }

      static renderModalCheckboxes() {
        const grid = document.getElementById('modalCheckboxGrid');
        grid.innerHTML = '';
        for (const [ticker, item] of Object.entries(TICKER_UNIVERSE)) {
          const isChecked = this.selectedTickers.includes(ticker);
          const label = document.createElement('label');
          label.id = `label-chk-${ticker}`;
          label.className = `flex items-center gap-2 p-2 rounded border cursor-pointer transition ${
            isChecked ? 'bg-emerald-950/60 border-emerald-500/80 text-emerald-300' : 'bg-slate-950 border-slate-800 text-slate-500 hover:border-slate-700'
          }`;
          label.innerHTML = `
            <input type="checkbox" id="chk-${ticker}" value="${ticker}" ${isChecked ? 'checked' : ''} onchange="UIController.toggleTicker('${ticker}')" class="accent-emerald-500">
            <div class="truncate">
              <span class="font-bold text-slate-200 block">${ticker}</span>
              <span class="text-[10px] text-slate-500 truncate block">${item.name}</span>
            </div>
          `;
          grid.appendChild(label);
        }
      }

      static toggleTicker(ticker) {
        const idx = this.selectedTickers.indexOf(ticker);
        const label = document.getElementById(`label-chk-${ticker}`);
        if (idx > -1) {
          this.selectedTickers.splice(idx, 1);
          if (label) label.className = 'flex items-center gap-2 p-2 rounded border cursor-pointer transition bg-slate-950 border-slate-800 text-slate-500 hover:border-slate-700';
        } else {
          this.selectedTickers.push(ticker);
          if (label) label.className = 'flex items-center gap-2 p-2 rounded border cursor-pointer transition bg-emerald-950/60 border-emerald-500/80 text-emerald-300';
        }
        this.updateActiveChips();
      }

      static selectAll(status) {
        this.selectedTickers = status ? Object.keys(TICKER_UNIVERSE) : [];
        this.updateActiveChips();
        this.renderModalCheckboxes();
      }

      static resetDefaults() {
        this.selectedTickers = ['QQQ', 'QLD', 'TQQQ', 'SPMO', 'SMH', 'SOXL'];
        this.updateActiveChips();
        this.renderModalCheckboxes();
      }

      static updateActiveChips() {
        const container = document.getElementById('activeChips');
        document.getElementById('selectedCount').innerText = this.selectedTickers.length;
        container.innerHTML = '';

        if (this.selectedTickers.length === 0) {
          container.innerHTML = `<span class="text-xs text-rose-400 font-semibold">선택된 자산이 없습니다.</span>`;
          return;
        }

        this.selectedTickers.forEach(ticker => {
          const chip = document.createElement('div');
          chip.className = 'inline-flex items-center gap-1 bg-emerald-950/80 border border-emerald-600/50 text-emerald-300 text-xs px-2 py-0.5 rounded';
          chip.innerHTML = `
            <span class="font-bold">${ticker}</span>
            <button onclick="UIController.toggleTicker('${ticker}'); UIController.runBacktest();" class="hover:text-rose-400 ml-1">&times;</button>
          `;
          container.appendChild(chip);
        });
      }

      static async runBacktest() {
        if (this.selectedTickers.length === 0) {
          document.getElementById('summaryCards').innerHTML = '';
          document.getElementById('summaryTableBody').innerHTML = `<tr><td colspan="7" class="px-4 py-6 text-center text-rose-400">분석 대상 자산을 지정하십시오.</td></tr>`;
          if (this.chartInstance) this.chartInstance.destroy();
          return;
        }

        const statusEl = document.getElementById('engineStatus');
        statusEl.className = "text-xs px-2.5 py-1 rounded bg-amber-950 text-amber-400 border border-amber-800 animate-pulse";
        statusEl.innerText = "수치 시뮬레이션 연산 중...";

        await new Promise(r => setTimeout(r, 10));

        const startYear = parseInt(document.getElementById('startYear').value);
        const endYear = parseInt(document.getElementById('endYear').value);
        const monthlyKrw = parseFloat(document.getElementById('monthlyKrw').value);
        const fxMode = document.getElementById('fxMode').value;
        const taxEnabled = document.getElementById('taxMode').value === 'enabled';

        // 의존성 포함 자산 유니버스 추출
        const requiredSet = new Set(this.selectedTickers);
        this.selectedTickers.forEach(t => {
          if (TICKER_UNIVERSE[t].type === 'synth') requiredSet.add(TICKER_UNIVERSE[t].base);
        });
        const fullTickers = Array.from(requiredSet);

        const calendar = MarketCalendarBuilder.generate(startYear, endYear);
        const engineData = QuantStochasticEngine.simulate(calendar, fullTickers, fxMode);
        const results = BacktestExecutionEngine.run(calendar, this.selectedTickers, engineData, monthlyKrw, taxEnabled);

        this.renderDashboard(results, calendar, taxEnabled);

        statusEl.className = "text-xs px-2.5 py-1 rounded bg-emerald-950 text-emerald-400 border border-emerald-800";
        statusEl.innerText = "연산 완료 (Single-Factor GBM 적용)";
      }

      static renderDashboard(results, calendar, taxEnabled) {
        document.getElementById('thFinalVal').innerText = taxEnabled ? '세후 실질 평가금' : '세전 최종 평가금';
        document.getElementById('thFinalReturn').innerText = taxEnabled ? '세후 수익률' : '세전 수익률';

        const cardsContainer = document.getElementById('summaryCards');
        cardsContainer.innerHTML = '';
        const palette = ['#34d399', '#60a5fa', '#f59e0b', '#f87171', '#c084fc', '#fb923c'];

        const firstTicker = Object.keys(results)[0];
        const invCard = document.createElement('div');
        invCard.className = 'bg-slate-900 p-4 rounded-xl border border-slate-800';
        invCard.innerHTML = `
          <span class="text-xs text-slate-500 font-bold block">총 원금 (Principal)</span>
          <div class="text-lg sm:text-xl font-bold mt-1 text-slate-200">
            ${(Math.round(results[firstTicker].investedKrw / 10000)).toLocaleString()}만 원
          </div>
        `;
        cardsContainer.appendChild(invCard);

        Object.entries(results).slice(0, 3).forEach(([ticker, res], idx) => {
          const card = document.createElement('div');
          card.className = 'bg-slate-900 p-4 rounded-xl border border-slate-800';
          card.innerHTML = `
            <span class="text-xs text-slate-400 font-bold block truncate">${res.name} (${taxEnabled ? '세후' : '세전'})</span>
            <div class="text-lg sm:text-xl font-bold mt-1 truncate" style="color: ${palette[idx % palette.length]}">
              ${(Math.round(res.finalVal / 10000)).toLocaleString()}만 원 (${res.finalReturn >= 0 ? '+' : ''}${res.finalReturn.toFixed(1)}%)
            </div>
          `;
          cardsContainer.appendChild(card);
        });

        // 테이블 렌더링
        const tbody = document.getElementById('summaryTableBody');
        tbody.innerHTML = '';
        for (const [ticker, res] of Object.entries(results)) {
          const tr = document.createElement('tr');
          tr.className = 'hover:bg-slate-800/40 border-b border-slate-800/60';
          const taxText = !taxEnabled ? '<span class="text-slate-500">미반영</span>' : (res.taxAmount > 0 ? Math.round(res.taxAmount).toLocaleString() + '원' : '0원 (공제 이내)');
          
          tr.innerHTML = `
            <td class="px-4 py-3 font-bold text-slate-200">${ticker} <span class="text-[10px] text-slate-500 font-normal">(${res.name})</span></td>
            <td class="px-4 py-3">${Math.round(res.investedKrw).toLocaleString()}원</td>
            <td class="px-4 py-3 text-slate-400">${Math.round(res.grossVal).toLocaleString()}원</td>
            <td class="px-4 py-3 text-amber-400 font-semibold">${taxText}</td>
            <td class="px-4 py-3 font-bold text-emerald-400">${Math.round(res.finalVal).toLocaleString()}원</td>
            <td class="px-4 py-3 ${res.finalReturn >= 0 ? 'text-rose-400' : 'text-blue-400'} font-bold">${res.finalReturn >= 0 ? '+' : ''}${res.finalReturn.toFixed(1)}%</td>
            <td class="px-4 py-3 text-slate-400">${res.mdd.toFixed(1)}%</td>
          `;
          tbody.appendChild(tr);
        }

        // 차트 렌더링 (Downsampling 시각화)
        const ctx = document.getElementById('quantChart').getContext('2d');
        if (this.chartInstance) this.chartInstance.destroy();

        const labels = calendar.dates;
        const step = Math.max(1, Math.floor(labels.length / 300));
        const sampledLabels = [];
        const sampledInvested = [];

        for (let i = 0; i < labels.length; i += step) {
          sampledLabels.push(labels[i]);
          sampledInvested.push(results[firstTicker].investedSeries[i] / 10000);
        }

        const datasets = [{
          label: '누적 원금 (KRW)',
          data: sampledInvested,
          borderColor: '#475569',
          borderDash: [3, 3],
          pointRadius: 0,
          borderWidth: 1.5
        }];

        Object.entries(results).forEach(([ticker, res], idx) => {
          const sampledData = [];
          for (let i = 0; i < labels.length; i += step) {
            sampledData.push(res.portfolioValues[i] / 10000);
          }
          datasets.push({
            label: ticker,
            data: sampledData,
            borderColor: palette[idx % palette.length],
            borderWidth: 1.8,
            pointRadius: 0
          });
        });

        this.chartInstance = new Chart(ctx, {
          type: 'line',
          data: { labels: sampledLabels, datasets },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            animation: false,
            interaction: { mode: 'index', intersect: false },
            scales: {
              x: { grid: { color: '#1e293b' }, ticks: { color: '#64748b', maxTicksLimit: 12 } },
              y: { 
                type: 'logarithmic',
                grid: { color: '#1e293b' }, 
                ticks: { color: '#64748b', callback: v => Math.round(v).toLocaleString() + '만' } 
              }
            },
            plugins: {
              legend: { labels: { color: '#94a3b8', font: { size: 11 } } }
            }
          }
        });
      }
    }

    window.onload = () => UIController.init();
  </script>
</body>
</html>
