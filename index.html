<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>DCA 적립식 백테스트 시뮬레이터 (30종 ETF 지원)</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen p-3 sm:p-6 md:p-8">

  <div class="max-w-7xl mx-auto space-y-4 sm:space-y-6">
    <!-- 헤더 -->
    <header class="border-b border-slate-700 pb-3 sm:pb-4 flex justify-between items-center flex-wrap gap-2">
      <div>
        <h1 class="text-xl sm:text-2xl md:text-3xl font-bold text-emerald-400">📈 Serverless DCA 적립식 백테스트</h1>
        <p class="text-slate-400 text-xs sm:text-sm mt-1">상위 30개 주요 ETF 커스텀 비교 & 환율 자동 반영 엔진</p>
      </div>
    </header>

    <!-- 컨트롤 파라미터 패널 -->
    <div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-6 gap-2.5 sm:gap-4 bg-slate-800 p-3 sm:p-4 rounded-xl border border-slate-700">
      <div>
        <label class="block text-[11px] sm:text-xs font-semibold text-slate-400 mb-1">시작 연도</label>
        <input type="number" id="startYear" value="2010" min="2000" max="2025" inputmode="numeric" class="w-full bg-slate-900 border border-slate-700 rounded px-2.5 py-1.5 text-xs sm:text-sm focus:outline-none focus:border-emerald-500">
      </div>
      <div>
        <label class="block text-[11px] sm:text-xs font-semibold text-slate-400 mb-1">종료 연도</label>
        <input type="number" id="endYear" value="2026" min="2001" max="2026" inputmode="numeric" class="w-full bg-slate-900 border border-slate-700 rounded px-2.5 py-1.5 text-xs sm:text-sm focus:outline-none focus:border-emerald-500">
      </div>
      <div>
        <label class="block text-[11px] sm:text-xs font-semibold text-slate-400 mb-1">월 적립금 (원)</label>
        <input type="number" id="monthlyKrw" value="300000" step="50000" inputmode="numeric" class="w-full bg-slate-900 border border-slate-700 rounded px-2.5 py-1.5 text-xs sm:text-sm focus:outline-none focus:border-emerald-500">
      </div>
      <div>
        <label class="block text-[11px] sm:text-xs font-semibold text-slate-400 mb-1">환율 적용 방식</label>
        <select id="fxMode" onchange="toggleFxInput()" class="w-full bg-slate-900 border border-slate-700 rounded px-2 py-1.5 text-xs sm:text-sm text-emerald-400 font-semibold focus:outline-none">
          <option value="historical">실제 환율 (자동)</option>
          <option value="fixed">고정 환율</option>
        </select>
      </div>
      <div>
        <label class="block text-[11px] sm:text-xs font-semibold text-slate-400 mb-1">고정 환율 (원)</label>
        <input type="number" id="fxRate" value="1350" step="10" inputmode="numeric" disabled class="w-full bg-slate-900/50 border border-slate-800 rounded px-2.5 py-1.5 text-xs sm:text-sm text-slate-500">
      </div>
      <div class="col-span-2 sm:col-span-1 flex items-end">
        <button onclick="runSimulation()" id="runBtn" class="w-full bg-emerald-500 active:bg-emerald-600 text-slate-950 font-bold py-2 sm:py-1.5 px-3 rounded text-xs sm:text-sm transition shadow-md">
          시뮬레이션 실행
        </button>
      </div>
    </div>

    <!-- 종목 선택 및 관리 섹션 -->
    <div class="bg-slate-800 p-3 sm:p-4 rounded-xl border border-slate-700 space-y-3">
      <div class="flex justify-between items-center">
        <span class="text-xs sm:text-sm font-semibold text-slate-300">
          비교 대상 종목 (<span id="selectedCount" class="text-emerald-400 font-bold">6</span>/30)
        </span>
        <button onclick="toggleAssetModal()" class="bg-slate-700 hover:bg-slate-600 text-slate-200 text-xs px-3 py-1.5 rounded-lg border border-slate-600 transition flex items-center gap-1">
          <span>⚙️ 종목 추가 / 삭제 (30개 ETF)</span>
        </button>
      </div>

      <!-- 선택된 종목 뱃지 리스트 -->
      <div id="activeChips" class="flex flex-wrap gap-1.5"></div>
    </div>

    <!-- 종목 선택 모달 레이어 -->
    <div id="assetModal" class="hidden fixed inset-0 bg-black/70 backdrop-blur-sm z-50 flex items-center justify-center p-3">
      <div class="bg-slate-800 border border-slate-700 rounded-2xl w-full max-w-2xl max-h-[85vh] flex flex-col shadow-2xl overflow-hidden">
        <div class="p-4 border-b border-slate-700 flex justify-between items-center bg-slate-800/90">
          <h3 class="font-bold text-base text-emerald-400">ETF 종목 선택 (최대 30개)</h3>
          <button onclick="toggleAssetModal()" class="text-slate-400 hover:text-slate-100 text-xl font-bold px-2">&times;</button>
        </div>
        
        <div class="p-4 overflow-y-auto space-y-4 text-xs sm:text-sm">
          <div class="flex gap-2">
            <button onclick="selectAllAssets(true)" class="bg-slate-700 hover:bg-slate-600 text-xs px-2.5 py-1 rounded text-slate-300">전체 선택</button>
            <button onclick="selectAllAssets(false)" class="bg-slate-700 hover:bg-slate-600 text-xs px-2.5 py-1 rounded text-slate-300">전체 해제</button>
            <button onclick="resetDefaultAssets()" class="bg-emerald-950/80 hover:bg-emerald-900 text-emerald-400 border border-emerald-700/50 text-xs px-2.5 py-1 rounded">기본 6개 복원</button>
          </div>

          <div id="modalCheckboxGrid" class="grid grid-cols-2 sm:grid-cols-3 gap-2"></div>
        </div>

        <div class="p-3 border-t border-slate-700 bg-slate-900/50 flex justify-end">
          <button onclick="toggleAssetModal(); runSimulation();" class="bg-emerald-500 hover:bg-emerald-600 text-slate-950 font-bold text-xs sm:text-sm py-2 px-5 rounded-lg transition">
            선택 완료 및 백테스트 실행
          </button>
        </div>
      </div>
    </div>

    <!-- 핵심 요약 카운터 (동적 생성) -->
    <div id="summaryCards" class="grid grid-cols-2 lg:grid-cols-4 gap-2.5 sm:gap-4"></div>

    <!-- 차트 영역 -->
    <div class="bg-slate-800 p-2 sm:p-4 rounded-xl border border-slate-700 relative h-[320px] sm:h-[450px]">
      <canvas id="dcaChart"></canvas>
    </div>

    <!-- 성과 요약 테이블 -->
    <div class="bg-slate-800 rounded-xl border border-slate-700 overflow-x-auto">
      <table class="w-full text-xs sm:text-sm text-left text-slate-300 min-w-[550px]">
        <thead class="text-[11px] sm:text-xs uppercase bg-slate-900/60 text-slate-400 border-b border-slate-700">
          <tr>
            <th class="px-3 py-2.5 sm:px-6 sm:py-3">종목명</th>
            <th class="px-3 py-2.5 sm:px-6 sm:py-3">총 투자원금</th>
            <th class="px-3 py-2.5 sm:px-6 sm:py-3">최종 평가금액</th>
            <th class="px-3 py-2.5 sm:px-6 sm:py-3">수익률 (%)</th>
            <th class="px-3 py-2.5 sm:px-6 sm:py-3">계좌 MDD (%)</th>
          </tr>
        </thead>
        <tbody id="summaryTableBody" class="divide-y divide-slate-700/50">
          <tr><td colspan="5" class="px-3 py-4 text-center text-slate-500">시뮬레이션을 실행해주세요.</td></tr>
        </tbody>
      </table>
    </div>

      'XLU':  { name: 'XLU (유틸리티)', category: '배당/가치', type: 'direct', data: [{date:'2000-01-01',price:30.00},{date:'2008-11-01',price:28.00},{date:'2010-01-01',price:31.00},{date:'2020-03-01',price:50.00},{date:'2021-11-01',price:68.00},{date:'2022-12-01',price:70.00},{date:'2024-07-01',price:72.00},{date:'2026-07-01',price:76.00}] },
      'IEMG': { name: 'IEMG (신흥국 주식)', category: '지수/대표', type: 'direct', data: [{date:'2012-10-01',price:42.00},{date:'2018-01-01',price:62.00},{date:'2020-03-01',price:41.00},{date:'2021-02-01',price:69.00},{date:'2022-12-01',price:46.00},{date:'2024-07-01',price:53.00},{date:'2026-07-01',price:58.00}] },
      'VUG':  { name: 'VUG (뱅가드 대형성장)', category: '지수/빅테크', type: 'direct', data: [{date:'2004-01-01',price:42.00},{date:'2008-11-01',price:36.00},{date:'2010-01-01',price:52.00},{date:'2020-03-01',price:170.00},{date:'2021-11-01',price:310.00},{date:'2022-12-01',price:220.00},{date:'2024-07-01',price:380.00},{date:'2026-07-01',price:425.00}] },
      'SQQQ': { name: 'SQQQ (나스닥 3배 인버스)', category: '지수/빅테크', type: 'synth', base: 'QQQ', leverage: -3, fee: 0.003 }
    };

    // 현재 선택된 자산 목록 (기본 6개)
    let selectedTickers = ['QQQ', 'QLD', 'TQQQ', 'SPMO', 'SMH', 'SOXL'];

    function toggleFxInput() {
      const fxMode = document.getElementById('fxMode').value;
      const fxInput = document.getElementById('fxRate');
      if (fxMode === 'fixed') {
        fxInput.disabled = false;
        fxInput.classList.remove('bg-slate-900/50', 'text-slate-500');
        fxInput.classList.add('bg-slate-900', 'text-slate-100');
      } else {
        fxInput.disabled = true;
        fxInput.classList.add('bg-slate-900/50', 'text-slate-500');
        fxInput.classList.remove('bg-slate-900', 'text-slate-100');
      }
    }

    // 모달 토글
    function toggleAssetModal() {
      const modal = document.getElementById('assetModal');
      modal.classList.toggle('hidden');
      if (!modal.classList.contains('hidden')) {
        renderModalCheckboxes();
      }
    }

    function renderModalCheckboxes() {
      const grid = document.getElementById('modalCheckboxGrid');
      grid.innerHTML = '';

      for (const [ticker, item] of Object.entries(ETF_DATABASE)) {
        const isChecked = selectedTickers.includes(ticker);
        const label = document.createElement('label');
        label.className = `flex items-center gap-2 p-2 rounded-lg border cursor-pointer transition ${
          isChecked ? 'bg-emerald-950/40 border-emerald-500/50 text-emerald-300' : 'bg-slate-900/60 border-slate-700/60 text-slate-400 hover:border-slate-600'
        }`;
        label.innerHTML = `
          <input type="checkbox" value="${ticker}" ${isChecked ? 'checked' : ''} onchange="toggleTickerSelection('${ticker}')" class="rounded accent-emerald-500">
          <div class="truncate">
            <span class="font-bold text-slate-100">${ticker}</span>
            <span class="block text-[10px] text-slate-400 truncate">${item.name}</span>
          </div>
        `;
        grid.appendChild(label);
      }
    }

    function toggleTickerSelection(ticker) {
      if (selectedTickers.includes(ticker)) {
        selectedTickers = selectedTickers.filter(t => t !== ticker);
      } else {
        selectedTickers.push(ticker);
      }
      updateActiveChips();
      renderModalCheckboxes();
    }

    function selectAllAssets(status) {
      if (status) {
        selectedTickers = Object.keys(ETF_DATABASE);
      } else {
        selectedTickers = [];
      }
      updateActiveChips();
      renderModalCheckboxes();
    }

    function resetDefaultAssets() {
      selectedTickers = ['QQQ', 'QLD', 'TQQQ', 'SPMO', 'SMH', 'SOXL'];
      updateActiveChips();
      renderModalCheckboxes();
    }

    function updateActiveChips() {
      const container = document.getElementById('activeChips');
      const countEl = document.getElementById('selectedCount');
      countEl.innerText = selectedTickers.length;
      container.innerHTML = '';

      if (selectedTickers.length === 0) {
        container.innerHTML = `<span class="text-xs text-rose-400 font-semibold">선택된 종목이 없습니다. 종목을 추가해 주세요.</span>`;
        return;
      }

      selectedTickers.forEach(ticker => {
        const chip = document.createElement('div');
        chip.className = 'inline-flex items-center gap-1 bg-emerald-950/80 border border-emerald-600/50 text-emerald-300 text-xs px-2 py-1 rounded-md';
        chip.innerHTML = `
          <span class="font-bold">${ticker}</span>
          <button onclick="toggleTickerSelection('${ticker}'); runSimulation();" class="hover:text-rose-400 font-bold ml-1">&times;</button>
        `;
        container.appendChild(chip);
      });
    }

    // 시계열 데이터 보간
    function generateTimeSeries(dataset, startYear, endYear) {
      const filtered = dataset.filter(d => {
        const y = parseInt(d.date.substring(0, 4));
        return y >= startYear - 1 && y <= endYear;
      });

      const fullSeries = [];
      for (let y = startYear - 1; y <= endYear; y++) {
        for (let m = 1; m <= 12; m++) {
          const mStr = m < 10 ? `0${m}` : `${m}`;
          const dateStr = `${y}-${mStr}-01`;
          if (dateStr > `${endYear}-07-01`) break;

          const match = filtered.find(d => d.date === dateStr);
          if (match) {
            fullSeries.push({ date: dateStr, price: match.price });
          } else {
            const prev = [...filtered].reverse().find(d => d.date < dateStr) || filtered[0];
            const next = filtered.find(d => d.date > dateStr) || filtered[filtered.length - 1];
            let price = prev.price;
            if (prev.date !== next.date) {
              const t1 = new Date(prev.date).getTime();
              const t2 = new Date(next.date).getTime();
              const tc = new Date(dateStr).getTime();
              const ratio = (tc - t1) / (t2 - t1);
              price = prev.price + (next.price - prev.price) * Math.min(Math.max(ratio, 0), 1);
            }
            fullSeries.push({ date: dateStr, price });
          }
        }
      }
      return fullSeries;
    }

    // 단일 종목 가격 배열 빌드 (합성 및 직렬 처리)
    function buildAssetPriceSeries(ticker, startYear, endYear, calculatedMap) {
      if (calculatedMap[ticker]) return calculatedMap[ticker];

      const item = ETF_DATABASE[ticker];
      if (item.type === 'direct') {
        const series = generateTimeSeries(item.data, startYear, endYear).map(d => d.price);
        calculatedMap[ticker] = series;
        return series;
      } else if (item.type === 'synth') {
        const baseSeries = buildAssetPriceSeries(item.base, startYear, endYear, calculatedMap);
        const synthPrices = [100];
        for (let i = 1; i < baseSeries.length; i++) {
          const baseRet = (baseSeries[i] - baseSeries[i - 1]) / baseSeries[i - 1];
          const leveragedRet = baseRet * item.leverage - item.fee;
          synthPrices.push(Math.max(synthPrices[i - 1] * (1 + leveragedRet), 0.0001));
        }
        calculatedMap[ticker] = synthPrices;
        return synthPrices;
      }
    }

    // 메인 시뮬레이션
    function runSimulation() {
      updateActiveChips();

      if (selectedTickers.length === 0) {
        document.getElementById('summaryCards').innerHTML = '';
        document.getElementById('summaryTableBody').innerHTML = `<tr><td colspan="5" class="px-3 py-4 text-center text-rose-400">비교할 종목을 선택해 주세요.</td></tr>`;
        if (chartInstance) chartInstance.destroy();
        return;
      }

      const startYear = parseInt(document.getElementById('startYear').value);
      const endYear = parseInt(document.getElementById('endYear').value);
      const monthlyKrw = parseFloat(document.getElementById('monthlyKrw').value);
      const fxMode = document.getElementById('fxMode').value;
      const fixedFx = parseFloat(document.getElementById('fxRate').value);

      const fxData = generateTimeSeries(USDKRW_HISTORICAL_DATA, startYear, endYear);
      const dates = fxData.map(d => d.date);
      const fxRates = fxData.map(d => fxMode === 'fixed' ? fixedFx : d.price);

      const calculatedMap = {};
      const assetPrices = {};

      selectedTickers.forEach(ticker => {
        assetPrices[ticker] = buildAssetPriceSeries(ticker, startYear, endYear, calculatedMap);
      });

      const results = {};
      const startDateStr = `${startYear}-01-01`;

      selectedTickers.forEach(ticker => {
        const prices = assetPrices[ticker];
        let shares = 0;
        let investedKrw = 0;
        const history = [];
        let peak = 0;
        let mdd = 0;

        for (let i = 0; i < dates.length; i++) {
          if (dates[i] < startDateStr) continue;

          const currentFx = fxRates[i];
          const monthlyUsd = monthlyKrw / currentFx;

          investedKrw += monthlyKrw;
          shares += monthlyUsd / prices[i];

          const currVal = shares * prices[i] * currentFx;
          
          if (currVal > peak) peak = currVal;
          const drawdown = (currVal - peak) / peak;
          if (drawdown < mdd) mdd = drawdown;

          history.push({
            date: dates[i],
            invested: investedKrw,
            portfolio: currVal
          });
        }

        const finalInv = history[history.length - 1].invested;
        const finalVal = history[history.length - 1].portfolio;
        const totalReturn = ((finalVal - finalInv) / finalInv) * 100;

        results[ticker] = {
          name: ETF_DATABASE[ticker].name,
          finalInv,
          finalVal,
          totalReturn,
          mdd: mdd * 100,
          history
        };
      });

      updateUI(results);
    }

    function updateUI(results) {
      const cardsContainer = document.getElementById('summaryCards');
      cardsContainer.innerHTML = '';

      const firstTicker = Object.keys(results)[0];
      const invCard = document.createElement('div');
      invCard.className = 'bg-slate-800 p-3 sm:p-4 rounded-xl border border-slate-700';
      invCard.innerHTML = `
        <span class="text-[11px] sm:text-xs text-slate-400 font-medium">총 투자 원금</span>
        <div class="text-base sm:text-xl md:text-2xl font-bold mt-1 text-slate-200 truncate">
          ${Math.round(results[firstTicker].finalInv / 10000).toLocaleString()}만 원
        </div>
      `;
      cardsContainer.appendChild(invCard);

      // 선택된 자산 상위 3개 카드 표출
      Object.entries(results).slice(0, 3).forEach(([ticker, res], idx) => {
        const card = document.createElement('div');
        card.className = 'bg-slate-800 p-3 sm:p-4 rounded-xl border border-slate-700';
        const color = COLOR_PALETTE[idx % COLOR_PALETTE.length];
        card.innerHTML = `
          <span class="text-[11px] sm:text-xs text-slate-400 font-medium truncate block">${res.name}</span>
          <div class="text-base sm:text-xl md:text-2xl font-bold mt-1 truncate" style="color: ${color}">
            ${Math.round(res.finalVal / 10000).toLocaleString()}만 원 (${res.totalReturn.toFixed(0)}%)
          </div>
        `;
        cardsContainer.appendChild(card);
      });

      // 테이블 바디
      const tbody = document.getElementById('summaryTableBody');
      tbody.innerHTML = '';
      
      for (const [ticker, res] of Object.entries(results)) {
        const tr = document.createElement('tr');
        tr.className = 'hover:bg-slate-700/30 border-b border-slate-700/50';
        tr.innerHTML = `
          <td class="px-3 py-2.5 sm:px-6 sm:py-3 font-semibold text-slate-200">${res.name}</td>
          <td class="px-3 py-2.5 sm:px-6 sm:py-3">${Math.round(res.finalInv).toLocaleString()}원</td>
          <td class="px-3 py-2.5 sm:px-6 sm:py-3 font-bold text-emerald-400">${Math.round(res.finalVal).toLocaleString()}원</td>
          <td class="px-3 py-2.5 sm:px-6 sm:py-3 ${res.totalReturn >= 0 ? 'text-rose-400' : 'text-blue-400'}">${res.totalReturn.toFixed(1)}%</td>
          <td class="px-3 py-2.5 sm:px-6 sm:py-3 text-slate-400">${res.mdd.toFixed(1)}%</td>
        `;
        tbody.appendChild(tr);
      }

      // 차트 생성
      const ctx = document.getElementById('dcaChart').getContext('2d');
      if (chartInstance) chartInstance.destroy();

      const refHistory = results[firstTicker].history;
      const labels = refHistory.map(h => h.date.substring(0, 7));
      const isMobile = window.innerWidth < 640;

      const datasets = [
        {
          label: '원금',
          data: refHistory.map(h => h.invested / 10000),
          borderColor: '#64748b',
          borderDash: [4, 4],
          pointRadius: 0,
          borderWidth: 1.5
        }
      ];

      Object.entries(results).forEach(([ticker, res], idx) => {
        datasets.push({
          label: ticker,
          data: res.history.map(h => h.portfolio / 10000),
          borderColor: COLOR_PALETTE[idx % COLOR_PALETTE.length],
          borderWidth: 2,
          pointRadius: 0
        });
      });

      chartInstance = new Chart(ctx, {
        type: 'line',
        data: { labels, datasets },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          interaction: { mode: 'index', intersect: false },
          scales: {
            x: { 
              grid: { color: '#334155' }, 
              ticks: { color: '#94a3b8', font: { size: isMobile ? 9 : 11 }, maxRotation: 0 } 
            },
            y: { 
              type: 'logarithmic',
              grid: { color: '#334155' }, 
              ticks: { 
                color: '#94a3b8', 
                font: { size: isMobile ? 9 : 11 },
                callback: v => Math.round(v).toLocaleString() + '만' 
              }
            }
          },
          plugins: {
            legend: { 
              labels: { 
                color: '#cbd5e1', 
                boxWidth: isMobile ? 10 : 16, 
                padding: isMobile ? 6 : 10,
                font: { size: isMobile ? 10 : 12 } 
              } 
            }
          }
        }
      });
    }

    window.onload = runSimulation;
  </script>
